name: lab_1_test

on:
  push:
    branches:
      - TEST
      - main
  pull_request:
    branches:
      - TEST
      - main
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install libs
      run: |
        pip  install pytest requests
    


    - name: Build Docker image
      run: |
         cd ./LAB_1 && docker build -t lab_1 -f dockerfile .
      
    - name: Run image
      run: |
          docker run -d -p 5000:5000 lab_1  

    - name: Run test
      run: |
        cd ./LAB_1 && python -m pytest api_test.py
