name: Projekt - CI Build Push Deploy 422971

on:
  push:
    branches: [main]
    paths:
      - Projekt/app/**
      - Projekt/Dockerfile
      - Projekt/k8s/**

permissions:
  id-token: write
  contents: read

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Projekt
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        working-directory: Projekt
        run: pytest app -v

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_422971 }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_422971 }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_422971 }}

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER_422971 }}" | cut -d'.' -f1)
          az acr login --name "$ACR_NAME"

      - name: Build and push Docker image
        working-directory: Projekt
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER_422971 }}/app:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP_422971 }} \
            --name ${{ secrets.AKS_NAME_422971 }} \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f Projekt/k8s/deployment.yaml
          kubectl apply -f Projekt/k8s/service.yaml

      - name: Update image in AKS
        run: |
          kubectl set image deployment/app \
            app=${{ secrets.ACR_LOGIN_SERVER_422971 }}/app:${{ github.sha }}

          kubectl rollout status deployment/app --timeout=180s